services:
  dev:
    build:
      context: .
      target: dev
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    environment:
      NODE_ENV: development
    command: npm run dev -- --host 0.0.0.0 --open=false

  test:
    build:
      context: .
      target: test
    profiles:
      - test

  app:
    build:
      context: .
      target: production
    ports:
      - "8080:80"
    profiles:
      - prod

volumes:
  node_modules:
